services:
  - type: web
    name: pro-brainy-ai-toolkit
    env: python
    region: oregon
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: GEMINI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
