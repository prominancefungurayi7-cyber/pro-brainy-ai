{% extends 'base.html' %}

{% block content %}

<div class="tool-container">
    <h1>Summarizer</h1>
    <p class="lead">Create concise or detailed summaries from longer content.</p>
    <form method="POST">
        <div class="form-group">
            <label for="text">Text to summarize</label>
            <textarea id="text" name="text" rows="10" placeholder="Paste text here..." required></textarea>
        </div>
        <div class="form-group">
            <label for="style">Summary style</label>
            <select id="style" name="style">
                <option value="concise">Concise</option>
                <option value="detailed">Detailed</option>
            </select>
        </div>
        <div class="form-group">
            <label for="education_level">Education level</label>
            <select id="education_level" name="education_level">
                <option value="Primary school">Primary school</option>
                <option value="O level">O level</option>
                <option value="A level">A level</option>
                <option value="Tertiary education">Tertiary education</option>
            </select>
        </div>
        <button type="submit">Summarize</button>
    </form>

    {% if output %}
    <div class="output-box">
        <h2>Summary</h2>
        <p>{{ output }}</p>
    </div>
    {% endif %}
</div>

{% endblock %}
