{% extends 'base.html' %}

{% block content %}

<div class="tool-container">
    <h1>Resume Generator</h1>
    <p class="lead">Build a polished resume summary from your experience and skills.</p>
    <form method="POST">
        <div class="form-group">
            <label for="name">Full name</label>
            <input id="name" name="name" type="text" placeholder="Your name" required>
        </div>
        <div class="form-group">
            <label for="title">Job title</label>
            <input id="title" name="title" type="text" placeholder="Target role" required>
        </div>
        <div class="form-group">
            <label for="experience">Experience summary</label>
            <textarea id="experience" name="experience" rows="6" placeholder="List your experience..." required></textarea>
        </div>
        <div class="form-group">
            <label for="skills">Skills</label>
            <textarea id="skills" name="skills" rows="4" placeholder="List your key skills..." required></textarea>
        </div>
        <button type="submit">Build Resume</button>
    </form>

    {% if output %}
    <div class="output-box">
        <h2>Resume Draft</h2>
        <p>{{ output }}</p>
    </div>
    {% endif %}
</div>

{% endblock %}
