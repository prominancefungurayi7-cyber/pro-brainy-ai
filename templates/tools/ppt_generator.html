{% extends 'base.html' %}

{% block content %}

<div class="tool-container">
    <h1>Presentation Generator</h1>
    <p class="lead">Create a concise slide outline with titles and key talking points.</p>
    <form method="POST">
        <div class="form-group">
            <label for="topic">Presentation topic</label>
            <input id="topic" name="topic" type="text" placeholder="Topic" required>
        </div>
        <div class="form-group">
            <label for="audience">Target audience</label>
            <input id="audience" name="audience" type="text" placeholder="Audience (optional)">
        </div>
        <div class="form-group">
            <label for="slides">Number of slides</label>
            <input id="slides" name="slides" type="number" value="5" min="3" max="20">
        </div>
        <button type="submit">Create Presentation Outline</button>
    </form>

    {% if output %}
    <div class="output-box">
        <h2>Presentation Outline</h2>
        <p>{{ output }}</p>
    </div>
    {% endif %}
</div>

{% endblock %}
